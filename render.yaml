services:
  - type: web
    name: telegram-media-bot
    runtime: python

    buildCommand: |
      apt-get update
      apt-get install -y ffmpeg
      pip install -r requirements.txt

    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT

    healthCheckPath: /health

    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: WEBHOOK_URL
        sync: false
      - key: BOT_USERNAME
        sync: false
      - key: PYTHON_VERSION
        value: "3.11.0"